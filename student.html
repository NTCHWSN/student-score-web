<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
    
  </head>
  <body>
    <a class="skip-link" href="#main-content">ข้ามไปยังเนื้อหา</a>
    <main id="main-content" class="app-shell">
      <section class="topbar">
        <div>
          <p class="eyebrow">โหมดนักเรียน</p>
          <h1>ระบบเช็คงานและคะแนนนักเรียน</h1>
        </div>
        <a class="text-link" href="index.html" data-page="index">เปลี่ยนโหมด</a>
      </section>

      <section id="student-login" class="panel narrow">
        <label for="student-teacher-username">ครูผู้สอน</label>
        <select id="student-teacher-username"></select>
        <label for="student-class">ห้อง</label>
        <select id="student-class"></select>
        <label for="student-no">เลขที่</label>
        <select id="student-no"></select>
        <label for="student-pin">PIN</label>
        <input id="student-pin" type="password" inputmode="numeric">
        <button id="student-login-button" type="button">เข้าสู่ระบบ</button>
        <p id="student-login-message" class="message"></p>
      </section>

      <section id="student-dashboard" class="workspace hidden">
        <section class="student-header">
          <div>
            <p id="student-class-label" class="eyebrow"></p>
            <h2 id="student-name"></h2>
          </div>
          <strong id="student-grade" class="grade-badge">-</strong>
        </section>

        <section class="metrics">
          <div class="metric"><span>คะแนนที่กรอกแล้ว</span><strong id="student-total">-</strong></div>
          <div class="metric"><span>ร้อยละจากงานที่กรอก</span><strong id="student-percent">-</strong></div>
          <div class="metric"><span>งานที่มีคะแนน</span><strong id="student-missing-count">-</strong></div>
        </section>

        <section class="split">
          <div class="panel">
            <h2>รายการคะแนน</h2>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>งาน</th>
                    <th>คะแนน</th>
                    <th>ผ่านที่</th>
                    <th>สถานะ</th>
                  </tr>
                </thead>
                <tbody id="student-score-body"></tbody>
              </table>
            </div>
          </div>
          <div class="panel">
            <h2>งานค้าง</h2>
            <div id="student-missing-list" class="list-block"></div>
            <h2>หมายเหตุครู</h2>
            <p id="student-note" class="note-text">-</p>
            <h2>เปลี่ยนรหัสเข้าใช้</h2>
            <label for="student-current-pin">รหัสเดิม</label>
            <input id="student-current-pin" type="password" autocomplete="current-password">
            <label for="student-new-pin">รหัสใหม่</label>
            <input id="student-new-pin" type="password" autocomplete="new-password" placeholder="4-20 ตัวอักษร">
            <label for="student-confirm-pin">ยืนยันรหัสใหม่</label>
            <input id="student-confirm-pin" type="password" autocomplete="new-password">
            <button id="change-pin-button" type="button">บันทึกรหัสใหม่</button>
            <p id="student-pin-message" class="message"></p>
          </div>
        </section>
      </section>
    </main>

    <script>
  window.APP_PAGE = 'student';
  window.APP_STATIC_FRONTEND = true;
  window.APP_API_URL = 'https://script.google.com/a/%2A/macros/s/AKfycbwoXFhOOOz2-nSeI3jqxCpyNKcxEQ1h4R4tLColvHDJEI_Ap4RbEH0qJ7IOrJ1Vubbw/exec';
</script>
    <script src="script.js"></script>
  </body>
</html>
